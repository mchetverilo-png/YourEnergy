<section class="hero">
  <div class="container">
    <div class="hero-wrapper">
      <div>
        <h1 class="hero-title">
          <svg class="hero-icon" width="38" height="38">
            <use href="./img/icons.svg#sun"></use>
          </svg>
          <span>Get Body in </span><span>shape, Stay healthy</span>
        </h1>
        <p class="hero-text">
          Transform your physique and embrace a healthier lifestyle with our
          comprehensive fitness and nutrition support.
        </p>
      </div>
      <div class="hero-image-wrapper">
        <img
          srcset="
            ./img/hero/image-desktop@1x.jpg 1x,
            ./img/hero/image-desktop@2x.jpg 2x
          "
          src="./img/hero/image-desktop@1x.jpg"
          alt="Young Women doing fitness"
        />
        <ul class="tags">
          <li>
            <button class="tags-button" type="button">#Sport</button>
          </li>
          <li>
            <button class="tags-button" type="button">#Healthy</button>
          </li>
          <li>
            <button class="tags-button" type="button">#Workout</button>
          </li>
          <li>
            <button class="tags-button" type="button">#Diet</button>
          </li>
        </ul>
      </div>
    </div>
    <picture>
      <source
        media="(min-width: 1440px)"
        srcset="
          ./img/hero/hero-desktop@1x.jpg 1x,
          ./img/hero/hero-desktop@2x.jpg 2x
        "
      />
      <source
        media="(min-width: 768px)"
        srcset="
          ./img/hero/hero-tablet@1x.jpg 1x,
          ./img/hero/hero-tablet@2x.jpg 2x
        "
      />
      <img
        class="hero-image"
        src="./img/hero/hero-mobile@1x.jpg"
        srcset="
          ./img/hero/hero-mobile@1x.jpg 1x,
          ./img/hero/hero-mobile@2x.jpg 2x
        "
        alt="Women working outside"
      />
    </picture>
    <ul class="tags">
      <li>
        <button class="tags-button" type="button">#Sport</button>
      </li>
      <li>
        <button class="tags-button" type="button">#Healthy</button>
      </li>
      <li>
        <button class="tags-button" type="button">#Workout</button>
      </li>
      <li>
        <button class="tags-button" type="button">#Diet</button>
      </li>
    </ul>
  </div>
</section>
